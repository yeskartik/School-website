<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Login - A.V.N. Inter College</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <main class="py-5">
    <div class="container">
      <h1>Staff Login</h1>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <form class="glass p-4">
            <div class="mb-2"><label>Username</label><input class="form-control"></div>
            <div class="mb-2"><label>Password</label><input type="password" class="form-control"></div>
            <button class="btn btn-primary">Login</button>
          </form>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
