<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Result Portal - A.V.N. Inter College</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <main class="py-5">
    <div class="container">
      <h1>Result Portal</h1>
      <p class="lead">Enter your roll number to view the result (UI only).</p>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <form class="glass p-3" onsubmit="event.preventDefault();alert('Lookup placeholder — integrate backend to fetch results')">
            <div class="mb-2"><label>Enter Roll Number</label><input class="form-control" required></div>
            <button class="btn btn-primary">Search</button>
          </form>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
