<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - A.V.N. Inter College</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <main class="py-5">
    <div class="container">
      <h1>Contact Us</h1>
      <div class="row g-4">
        <div class="col-md-6" data-aos="fade-right">
          <h5>Get in touch</h5>
          <p>Address: Uttar Pradesh, Jethwara, Pratapgarh - 230129</p>
          <p>Phone: 9838533690</p>
          <p>Email: <a href="mailto:ktkartikeytiwari@gmail.com">ktkartikeytiwari@gmail.com</a></p>
          <h5>Send a message</h5>
          <form class="glass p-3">
            <div class="mb-2"><label>Name</label><input class="form-control"></div>
            <div class="mb-2"><label>Email</label><input class="form-control" type="email"></div>
            <div class="mb-2"><label>Message</label><textarea class="form-control" rows="4"></textarea></div>
            <button class="btn btn-primary">Send Message</button>
          </form>
        </div>
        <div class="col-md-6" data-aos="fade-left">
          <h5>Find us</h5>
          <div class="glass p-3" style="height:300px;display:flex;align-items:center;justify-content:center">Google Map Placeholder</div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
