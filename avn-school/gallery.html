<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery - A.V.N. Inter College</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <main class="py-5">
    <div class="container">
      <h1>Gallery</h1>
      <p class="lead">Explore moments from school life.</p>
      <div class="mb-3">
        <button class="btn btn-sm btn-outline-light me-2" data-filter="all">All</button>
        <button class="btn btn-sm btn-outline-light me-2" data-filter="sports">Sports</button>
        <button class="btn btn-sm btn-outline-light me-2" data-filter="events">Events</button>
        <button class="btn btn-sm btn-outline-light" data-filter="labs">Labs</button>
      </div>
      <div class="gallery-grid" id="gallery">
    <div class="gallery-item" data-src="images/gallary1.jpeg" data-cat="events" style="background-image:url('images/gallary1.jpeg')"></div>
    <div class="gallery-item" data-src="images/gallary2.jpeg" data-cat="sports" style="background-image:url('images/gallary2.jpeg')"></div>
    <div class="gallery-item" data-src="images/gallary3.jpeg" data-cat="labs" style="background-image:url('images/gallary3.jpeg')"></div>
    <div class="gallery-item" data-src="images/gallary4.jpeg" data-cat="events" style="background-image:url('images/gallary4.jpeg')"></div>
    <div class="gallery-item" data-src="images/gallary5.jpeg" data-cat="sports" style="background-image:url('images/gallary5.jpeg')"></div>
    </div>
    </div>
  </div>
    </div>
  </main>
  <div id="footer"></div>
  <div class="modal fade" id="lightboxModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-lg"><div class="modal-content bg-transparent border-0"><div class="modal-body p-0"><img id="lightboxImage" src="" alt="preview" class="w-100 rounded"></div></div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
  <script>
    // simple filter
    document.addEventListener('click',(e)=>{
      const btn = e.target.closest('button[data-filter]');
      if(!btn) return;
      const f = btn.dataset.filter; document.querySelectorAll('#gallery .gallery-item').forEach(it=>{it.style.display=(f==='all'||it.dataset.cat===f)?'block':'none'});
    });
  </script>
</body>
</html>
